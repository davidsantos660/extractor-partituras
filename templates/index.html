<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetMusic Extractor - Transcribe tus vídeos</title>
    <style>
        /* ESTILOS BLINDADOS EN CSS PURO (Evita que se rompa la web) */
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --color-acento: #10b981;
            --color-acento-hover: #059669;
            --borde: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100-screen;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
        }

        header {
            background-color: var(--bg-tarjeta);
            border-b: 1px solid var(--borde);
            padding: 24px;
            text-center: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: var(--color-acento);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--texto-secundario);
            font-size: 14px;
            margin-top: 4px;
        }

        main {
            width: 100%;
            max-width: 450px;
            margin: auto;
            padding: 32px;
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            border: 1px solid var(--borde);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .grupo-formulario {
            margin-bottom: 24px;
        }

        .etiqueta {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--texto-principal);
            margin-bottom: 8px;
        }

        /* CONTROL ESTRICTO DEL ICONO: Evita que la nube se vuelva gigante */
        .zona-subida {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 150px;
            border: 2px dashed var(--borde);
            border-radius: 12px;
            cursor: pointer;
            background-color: rgba(51, 65, 85, 0.3);
            transition: all 0.2s ease;
        }

        .zona-subida:hover {
            background-color: rgba(51, 65, 85, 0.5);
            border-color: var(--color-acento);
        }

        .icono-nube {
            width: 48px;
            height: 48px;
            fill: none;
            stroke: var(--texto-secundario);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 12px;
        }

        .zona-subida p {
            font-size: 13px;
            color: var(--texto-secundario);
            text-align: center;
        }

        select {
            width: 100%;
            background-color: #334155;
            border: 1px solid var(--borde);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--texto-principal);
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--color-acento);
        }

        .btn-enviar {
            width: 100%;
            background-color: var(--color-acento);
            color: #0f172a;
            font-size: 16px;
            font-weight: 700;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .btn-enviar:hover {
            background-color: var(--color-acento-hover);
            transform: translateY(-1px);
        }

        #loading {
            display: none;
            text-align: center;
            color: var(--color-acento);
            font-weight: 600;
            font-size: 15px;
            padding: 12px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        footer {
            padding: 16px;
            text-align: center;
            font-size: 12px;
            color: #475569;
            background-color: #020617;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎵 SheetMusic Extractor</h1>
        <p>Transforma vídeos de transcripciones en PDFs limpios al instante</p>
    </header>

    <main>
        <form action="/" method="POST" enctype="multipart/form-data" onsubmit="mostrarCarga()">
            
            <div class="grupo-formulario">
                <label class="etiqueta">1. Sube tu vídeo recortado (.mp4, .mkv)</label>
                <label class="zona-subida">
                    <!-- Icono SVG controlado de tamaño fijo -->
                    <svg class="icono-nube" viewBox="0 0 24 24">
                        <path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p>Haz clic para buscar o arrastra el archivo aquí</p>
                    <input type="file" name="video" accept=".mp4,.mkv,.avi" style="display: none;" required />
                </label>
            </div>

            <div class="grupo-formulario">
                <label class="etiqueta">2. Elige el formato de salida</label>
                <select name="formato">
                    <option value="2">Horizontal (2 por fila - Ideal para PC)</option>
                    <option value="1">Vertical (1 por fila - Ideal para imprimir)</option>
                </select>
            </div>

            <button type="submit" id="btn-submit" class="btn-enviar">
                🚀 Generar Partitura Completa
            </button>
            
            <div id="loading">
                ⏳ Analizando fotogramas... Esto puede tardar un minuto.
            </div>
        </form>
    </main>

    <footer>
        Hecho por músicos para músicos. Todos los derechos reservados.
    </footer>

    <script>
        function mostrarCarga() {
            document.getElementById('btn-submit').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
        }
    </script>
</body>
</html>
