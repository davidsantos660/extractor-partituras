<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SheetMusic Extractor</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            text-align: center;
        }
        main {
            width: 100%;
            max-width: 550px;
            margin: auto;
            padding: 24px;
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 20px; }
        .label { display: block; font-size: 14px; margin-bottom: 8px; }
        .upload-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 90px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            cursor: pointer;
            background-color: rgba(51, 65, 85, 0.3);
        }
        #preview-container {
            display: none;
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            overflow: hidden;
        }
        #canvas-preview { width: 100%; display: block; height: auto; }
        .slider-box {
            background-color: rgba(15, 23, 42, 0.4);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .slider-control { margin-bottom: 10px; }
        .slider-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        input[type="range"], select, input[type="text"] {
            width: 100%;
            accent-color: var(--accent);
        }
        select, input[type="text"] {
            background-color: #334155;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            color: var(--text-main);
            outline: none;
            font-size: 14px;
        }
        .title-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .title-row input:first-child { flex: 2; }
        .title-row input:last-child { flex: 1; }
        #title-preview-box {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 14px 18px;
            min-height: 50px;
        }
        #title-preview-text {
            color: #0f172a;
            font-size: 20px;
            text-align: center;
            font-weight: 600;
        }
        #author-preview-text {
            color: #475569;
            font-size: 12px;
            text-align: right;
            margin-top: 4px;
        }
        .btn-primary {
            width: 100%;
            background-color: var(--accent);
            color: #0f172a;
            font-size: 16px;
            font-weight: 700;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-secondary {
            width: 100%;
            background-color: transparent;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }
        #loading {
            display: none;
            text-align: center;
            color: var(--accent);
            font-weight: 600;
            padding: 10px;
            animation: pulse 1.5s infinite;
        }
        #error-box {
            display: none;
            text-align: center;
            color: #f87171;
            font-weight: 600;
            padding: 10px;
            font-size: 14px;
        }
        #success-screen {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        footer {
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: #475569;
            background-color: #020617;
        }
    </style>
</head>
<body>
    <header><h1>🎵 SheetMusic Extractor</h1></header>
    <main>
        <form id="sheet-form" enctype="multipart/form-data">
            <div id="form-steps">
                <div class="form-group">
                    <label class="label">1. Upload your sheet music video</label>
                    <label class="upload-zone">
                        <p id="upload-text">Click to choose your video file</p>
                        <input type="file" id="video-input" name="video" accept=".mp4,.mkv,.avi" style="display:none;" required onchange="handleVideoUpload(event)" />
                    </label>
                </div>

                <div id="preview-container"><canvas id="canvas-preview"></canvas></div>

                <div id="duration-trim-block" class="form-group" style="display:none;">
                    <label class="label">2. Trim the video (skip intro or outro)</label>
                    <div class="slider-box">
                        <div class="slider-control">
                            <div class="slider-info"><span>Start</span><span id="txt-start">0:00</span></div>
                            <input type="range" id="range-start" min="0" max="100" value="0" oninput="updateDurationTrim('start')">
                        </div>
                        <div class="slider-control" style="margin-bottom:0;">
                            <div class="slider-info"><span>End</span><span id="txt-end">0:00</span></div>
                            <input type="range" id="range-end" min="0" max="100" value="100" oninput="updateDurationTrim('end')">
                        </div>
                    </div>
                    <input type="hidden" name="inicio_seg" id="input-start-sec" value="0">
                    <input type="hidden" name="fin_seg" id="input-end-sec" value="">
                </div>

                <div class="form-group">
                    <label class="label">3. Adjust the sheet music area</label>
                    <div class="slider-box">
                        <div class="slider-control">
                            <div class="slider-info"><span>Top</span><span><span id="val-top">0</span>%</span></div>
                            <input type="range" name="corte_sup" id="crop-top" min="0" max="80" value="0" oninput="updateCrop()">
                        </div>
                        <div class="slider-control" style="margin-bottom:0;">
                            <div class="slider-info"><span>Bottom</span><span><span id="val-bottom">0</span>%</span></div>
                            <input type="range" name="corte_inf" id="crop-bottom" min="0" max="80" value="0" oninput="updateCrop()">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="label">4. Output format</label>
                    <select name="formato">
                        <option value="1" selected>Vertical (1 per row - best for printing)</option>
                        <option value="2">Horizontal (2 per row - best for computer screens)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="label">5. Song title and author (optional)</label>
                    <div class="title-row">
                        <input type="text" name="titulo" id="input-title" placeholder="Song title" maxlength="80" oninput="updateTitlePreview()">
                        <input type="text" name="autor" id="input-author" placeholder="Author / artist" maxlength="50" oninput="updateTitlePreview()">
                    </div>
                    <div id="title-preview-box">
                        <div id="title-preview-text">Song title</div>
                        <div id="author-preview-text"></div>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="btn-primary">🚀 Process and Download PDF</button>
                <div id="loading">⏳ Processing your video... Long videos may take a minute.</div>
                <div id="error-box"></div>
            </div>

            <div id="success-screen">
                <p style="font-size:40px; margin:0;">✅</p>
                <p style="font-size:16px; font-weight:600; margin:10px 0 4px;">Your PDF is ready!</p>
                <p style="font-size:13px; color:#94a3b8; margin:0 0 20px;">The download should start automatically.</p>
                <button type="button" class="btn-primary" onclick="generateAgain()">🔁 Generate another sheet</button>
                <button type="button" class="btn-secondary" onclick="backToStart()">↩ Back to start</button>
            </div>
        </form>
    </main>
    <footer>Made by musicians, for musicians.</footer>
    <video id="hidden-video" style="display:none;"></video>
    <script>
        let hiddenVideo = document.getElementById('hidden-video');
        let canvas = document.getElementById('canvas-preview');
        let ctx = canvas.getContext('2d');
        let frameLoaded = false;

        function handleVideoUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            const file = files[0];
            document.getElementById('upload-text').innerText = file.name;
            hiddenVideo.src = URL.createObjectURL(file);
            hiddenVideo.load();
            hiddenVideo.onloadedmetadata = function() {
                hiddenVideo.currentTime = 15;

                document.getElementById('duration-trim-block').style.display = 'block';
                document.getElementById('range-start').value = 0;
                document.getElementById('range-end').value = 100;
                document.getElementById('input-start-sec').value = 0;
                document.getElementById('input-end-sec').value = hiddenVideo.duration.toFixed(2);
                document.getElementById('txt-end').innerText = formatTime(hiddenVideo.duration);
            };
            hiddenVideo.onseeked = function() {
                canvas.width = hiddenVideo.videoWidth;
                canvas.height = hiddenVideo.videoHeight;
                document.getElementById('preview-container').style.display = 'block';
                frameLoaded = true;
                drawGuides();
            };
        }

        function drawGuides() {
            if (!frameLoaded) return;
            ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
            let yTop = canvas.height * (parseFloat(document.getElementById('crop-top').value) / 100);
            let yBottom = canvas.height * ((100 - parseFloat(document.getElementById('crop-bottom').value)) / 100);
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, 0, canvas.width, yTop);
            ctx.fillRect(0, yBottom, canvas.width, canvas.height - yBottom);
            ctx.strokeStyle = "#ef4444";
            ctx.lineWidth = Math.max(4, canvas.height * 0.006);
            ctx.setLineDash([canvas.width * 0.015, canvas.width * 0.015]);
            ctx.beginPath();
            ctx.moveTo(0, yTop);
            ctx.lineTo(canvas.width, yTop);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, yBottom);
            ctx.lineTo(canvas.width, yBottom);
            ctx.stroke();
        }

        function updateCrop() {
            document.getElementById('val-top').innerText = document.getElementById('crop-top').value;
            document.getElementById('val-bottom').innerText = document.getElementById('crop-bottom').value;
            drawGuides();
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateDurationTrim(source) {
            const duration = hiddenVideo.duration;
            if (!duration || isNaN(duration)) return;

            let start = parseFloat(document.getElementById('range-start').value) / 100 * duration;
            let end = parseFloat(document.getElementById('range-end').value) / 100 * duration;

            if (start >= end) {
                if (source === 'end') {
                    end = Math.min(duration, start + 1);
                    document.getElementById('range-end').value = (end / duration) * 100;
                } else {
                    start = Math.max(0, end - 1);
                    document.getElementById('range-start').value = (start / duration) * 100;
                }
            }

            document.getElementById('txt-start').innerText = formatTime(start);
            document.getElementById('txt-end').innerText = formatTime(end);
            document.getElementById('input-start-sec').value = start.toFixed(2);
            document.getElementById('input-end-sec').value = end.toFixed(2);

            const previewTime = (source === 'end') ? end : Math.max(start, 0.08);
            hiddenVideo.currentTime = previewTime;
        }

        function updateTitlePreview() {
            const title = document.getElementById('input-title').value.trim();
            const author = document.getElementById('input-author').value.trim();
            document.getElementById('title-preview-text').innerText = title || 'Song title';
            document.getElementById('author-preview-text').innerText = author;
        }
        updateTitlePreview();

        function showLoading() {
            document.getElementById('btn-submit').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error-box').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('btn-submit').style.display = 'block';
        }

        function showSuccessScreen() {
            document.getElementById('form-steps').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        }

        function generateAgain() {
            window.location.reload();
        }

        function backToStart() {
            window.location.href = '/';
        }

        document.getElementById('sheet-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            showLoading();

            try {
                const response = await fetch('/procesar', {
                    method: 'POST',
                    body: new FormData(this),
                });

                if (!response.ok) {
                    let message = 'Something went wrong while processing your video.';
                    try {
                        const data = await response.json();
                        if (data.error) message = data.error;
                    } catch (e) {}
                    throw new Error(message);
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'sheet_music.pdf';
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);

                hideLoading();
                showSuccessScreen();
            } catch (error) {
                hideLoading();
                const errorBox = document.getElementById('error-box');
                errorBox.innerText = '⚠️ ' + error.message;
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
