<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - SheetMusic Pro</title>
    <style>
        :root { 
            --bg-principal: #0f172a; 
            --bg-tarjeta: #1e293b; 
            --texto-principal: #f8fafc; 
            --texto-secundario: #94a3b8; 
            --color-acento: #10b981; 
            --borde: #334155; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-principal); color: var(--texto-principal); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        main { width: 100%; max-width: 400px; padding: 32px; background-color: var(--bg-tarjeta); border-radius: 16px; border: 1px solid var(--borde); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        h2 { font-size: 24px; color: var(--texto-principal); margin-bottom: 24px; text-align: center; }
        h2 span { color: var(--color-acento); }
        
        .grupo-formulario { margin-bottom: 20px; }
        .etiqueta { display: block; font-size: 14px; margin-bottom: 8px; color: var(--texto-secundario); }
        
        input[type="email"], input[type="password"] { width: 100%; background-color: #334155; border: 1px solid var(--borde); border-radius: 12px; padding: 12px 16px; color: var(--texto-principal); font-size: 15px; outline: none; transition: border-color 0.2s; }
        input[type="email"]:focus, input[type="password"]:focus { border-color: var(--color-acento); }
        
        .btn-enviar { width: 100%; background-color: var(--color-acento); color: #0f172a; font-size: 16px; font-weight: 700; padding: 12px; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-enviar:hover { background-color: #059669; }
        
        .enlace-cambio { display: block; margin-top: 20px; text-align: center; font-size: 14px; color: var(--texto-secundario); text-decoration: none; }
        .enlace-cambio a { color: var(--color-acento); text-decoration: none; font-weight: 600; }
        
        /* Estilo para la caja de error inyectada */
        .alerta-error { background-color: rgba(244, 63, 94, 0.2); border: 1px solid #f43f5e; color: #f43f5e; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; text-align: center; font-weight: 600; }
    </style>
</head>
<body>
    <main>
        <form method="POST">
            <h2>🎵 Log In to <span>Pro</span></h2>
            
            <!-- Bloque dinámico para renderizar los errores dentro de la interfaz -->
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="alerta-error">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="grupo-formulario">
                <label class="etiqueta">Email Address</label>
                <input type="email" name="email" placeholder="name@domain.com" required>
            </div>
            <div class="grupo-formulario">
                <label class="etiqueta">Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-enviar">Sign In</button>
            <span class="enlace-cambio">New to SheetMusic? <a href="/registro">Create an account</a></span>
        </form>
    </main>
</body>
</html>
